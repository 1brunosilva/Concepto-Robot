<script>
gsap.registerPlugin(ScrollTrigger);
const isMob = window.innerWidth <= 680;

// ── 1. HARDWARE ACCELERATED CURSOR ──
const cd = document.getElementById('cd'), cr = document.getElementById('cr');
let mx = window.innerWidth/2, my = window.innerHeight/2, rx = mx, ry = my;

if(!isMob) {
  document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; }, {passive: true});
  function animCursor() {
    rx += (mx - rx) * 0.15; ry += (my - ry) * 0.15;
    cd.style.transform = `translate3d(${mx}px, ${my}px, 0) translate(-50%, -50%)`;
    cr.style.transform = `translate3d(${rx}px, ${ry}px, 0) translate(-50%, -50%)`;
    requestAnimationFrame(animCursor);
  }
  requestAnimationFrame(animCursor);
}

// ── 2. NAV & OBSERVERS ──
const navEl = document.getElementById('nav');
const nightEl = document.getElementById('s-night');

let isScrolling = false;
window.addEventListener('scroll', () => {
  if(!isScrolling) {
    window.requestAnimationFrame(() => {
      const r = nightEl.getBoundingClientRect();
      const inNight = r.top < 58 && r.bottom > 0;
      navEl.classList.toggle('dk', inNight);
      navEl.classList.toggle('bg', !inNight && window.scrollY > 30);
      if(!isMob) {
        cd.classList.toggle('vlt', inNight);
        cr.classList.toggle('vlt', inNight);
      }
      isScrolling = false;
    });
    isScrolling = true;
  }
}, { passive: true });

const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if(e.isIntersecting) {
      e.target.classList.add('in');
      observer.unobserve(e.target);
    }
  });
}, { threshold: 0.1 });
document.querySelectorAll('.rv').forEach(el => observer.observe(el));

// ── 3. CHAT ANIMATION ──
const msgs = [
  { t: 'in', txt: 'Hola! cuánto sale un chatbot?', d: 0 },
  { t: 'typing', d: 1100 },
  { t: 'out', txt: 'Hola! Armamos bots para WhatsApp e Instagram. Arrancamos desde $400. ¿Para qué negocio?', d: 2200 },
  { t: 'in', txt: 'Peluquería, quiero que tome turnos solo', d: 3600 },
  { t: 'typing', d: 4700 },
  { t: 'out', txt: 'Perfecto, es exactamente para eso 🤖 El bot confirma, manda recordatorios y responde 24hs. ¿Querés una demo?', d: 5600 },
  { t: 'in', txt: 'Sí! cuándo empezamos?', d: 7000 },
  { t: 'sys', txt: '✓ Venta cerrada · 3:14 AM', d: 8200 },
];
let chatGoing = false;
const cwBody = document.getElementById('cwBody');

function runChat() {
  if(chatGoing) return;
  chatGoing = true;
  cwBody.innerHTML = '';
  msgs.forEach(m => {
    setTimeout(() => {
      const prev = cwBody.querySelector('.cw-typing');
      if(prev && m.t !== 'typing') prev.remove();
      const el = document.createElement('div');
      if(m.t === 'typing') {
        el.className = 'cw-typing';
        el.innerHTML = '<div class="td"></div><div class="td"></div><div class="td"></div>';
      } else {
        el.className = `cm ${m.t}`;
        const timeHTML = m.t === 'out' ? '<div class="ct">3:14 AM <span class="ck">✓✓</span></div>' : '<div class="ct">3:14 AM</div>';
        el.innerHTML = m.t === 'sys' ? m.txt : m.txt + timeHTML;
      }
      cwBody.appendChild(el);
      requestAnimationFrame(() => { el.classList.add('vis'); cwBody.scrollTop = cwBody.scrollHeight; });
    }, m.d);
  });
  setTimeout(() => { chatGoing = false; runChat(); }, msgs[msgs.length - 1].d + 4500);
}
new IntersectionObserver(es => { if(es[0].isIntersecting) runChat(); }, { threshold: 0.25 }).observe(nightEl);

// ── 4. THREE.JS BULLETPROOF ENGINE (LERP) ──
const canvas = document.getElementById('rc');
const renderer = new THREE.WebGLRenderer({ 
    canvas, 
    alpha: true, 
    antialias: !isMob, // CLAVE: Apagar en móvil para evitar lag
    powerPreference: "high-performance" 
});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputEncoding = THREE.sRGBEncoding;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.z = 5;

// Luces optimizadas
const ambLight = new THREE.AmbientLight(0xffffff, 1.5); scene.add(ambLight);
const kl = new THREE.DirectionalLight(0xffffff, 2.6); kl.position.set(2, 4, 3); scene.add(kl);
const vl = new THREE.PointLight(0xa855f7, 0, 8); vl.position.set(0, 1, 3); scene.add(vl);

// Sistema de Estados e Interpolación
let mesh = null;
let idleT = 0;
let robotIdleRotation = 0;

// Estado actual (el que se renderiza)
const currentS = { x: 0, y: 0, sc: 1, ry: 0, rx: 0 };
// Estado objetivo (al que queremos llegar)
const targetS = { x: 0, y: 0, sc: 1, ry: 0, rx: 0 };

function worldW() { return 2 * Math.tan(camera.fov * Math.PI / 360) * camera.position.z * camera.aspect; }
function worldH() { return 2 * Math.tan(camera.fov * Math.PI / 360) * camera.position.z; }

const DS = [
  { x: .30, y: .05, sc: 1.15, ry: 0, rx: 0 },
  { x: .28, y: .00, sc: 1.45, ry: .12, rx: -.05 },
  { x:-.30, y:-.10, sc: 1.35, ry: .08, rx: 0 },
  { x: .28, y: .12, sc: .85, ry:-.10, rx: 0 },
  { x:-.28, y:-.08, sc: 1.20, ry: .15, rx:-.06 },
  { x: .32, y: .08, sc: .72, ry:-.10, rx: .04 },
  { x:-.22, y:-.05, sc: 1.20, ry: Math.PI*2, rx:-.05 },
  { x: .05, y:-.28, sc: 1.00, ry: 0, rx: 0 },
  { x: .05, y:-.30, sc: 1.10, ry: 0, rx: 0 },
];
const MS = [
  { x: 0, y: .32, sc: 1.00, ry: 0, rx: 0 },
  { x: 0, y: .28, sc: 1.15, ry: .10, rx:-.04 },
  { x: .22, y:-.36, sc: 1.12, ry: .10, rx: 0 },
  { x:-.20, y: .30, sc: 1.22, ry:-.10, rx: 0 },
  { x: .20, y:-.34, sc: .80, ry: .18, rx:-.06 },
  { x:-.18, y: .28, sc: 1.15, ry:-.08, rx: .04 },
  { x: .16, y:-.30, sc: 1.05, ry: Math.PI*2, rx:-.06 },
  { x: 0, y: .20, sc: .90, ry: 0, rx: 0 },
  { x: 0, y:-.36, sc: .92, ry: 0, rx: 0 },
];
const STATES = isMob ? MS : DS;
const SECS = ['#s-hero', '#s-night', '#s-auto', '#s-webs', '#s-chat', '#s-mkt', '#s-ia', '#s-proc', '#s-cta'];

const lerp = (a, b, n) => (1 - n) * a + n * b;

function updatePhysics() {
  if(!mesh) return;
  // Suavizado de valores (0.07 es el factor de "fluidez")
  currentS.x = lerp(currentS.x, targetS.x, 0.07);
  currentS.y = lerp(currentS.y, targetS.y, 0.07);
  currentS.sc = lerp(currentS.sc, targetS.sc, 0.07);
  currentS.ry = lerp(currentS.ry, targetS.ry, 0.07);
  currentS.rx = lerp(currentS.rx, targetS.rx, 0.07);

  mesh.position.x = currentS.x * (worldW() / 2);
  mesh.position.y = currentS.y * (worldH() / 2) + Math.sin(idleT * 0.65) * 0.04;
  mesh.scale.setScalar(currentS.sc * (isMob ? 1.1 : 1.85));
  mesh.rotation.y = currentS.ry + robotIdleRotation;
  mesh.rotation.x = currentS.rx;
}

const loader = new THREE.GLTFLoader();
loader.load('https://concepto-robot.vercel.app/Prueba1.glb', gltf => {
  mesh = gltf.scene;
  const box = new THREE.Box3().setFromObject(mesh);
  const c = box.getCenter(new THREE.Vector3());
  const sz = box.getSize(new THREE.Vector3());
  mesh.position.sub(c);
  mesh.scale.setScalar(1 / Math.max(sz.x, sz.y, sz.z));
  scene.add(mesh);

  // Configuramos el objetivo inicial
  Object.assign(targetS, STATES[0]);
  Object.assign(currentS, STATES[0]);

  SECS.forEach((sel, i) => {
    ScrollTrigger.create({
      trigger: sel,
      start: 'top 60%',
      onToggle: (self) => {
        if(self.isActive) {
          Object.assign(targetS, STATES[i]);
          sel === '#s-night' ? 
            gsap.to([ambLight, kl, vl], { intensity: (idx, target) => target === vl ? 4 : (idx === 0 ? 0.5 : 0.9), duration: 1 }) : 
            gsap.to([ambLight, kl, vl], { intensity: (idx, target) => target === vl ? 0 : (idx === 0 ? 1.5 : 2.6), duration: 1 });
        }
      }
    });
  });

  setTimeout(() => document.getElementById('ldr').classList.add('out'), 400);
}, undefined, () => document.getElementById('ldr').classList.add('out'));

function loop() {
  requestAnimationFrame(loop);
  if(mesh) {
    idleT += 0.012; 
    robotIdleRotation += 0.018;
    updatePhysics();
    renderer.render(scene, camera);
  }
}
loop();

let resT;
window.addEventListener('resize', () => {
  clearTimeout(resT);
  resT = setTimeout(() => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  }, 150);
}, { passive: true });
</script>
